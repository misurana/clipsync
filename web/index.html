<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ClipSync</title>
  <link rel="stylesheet" href="style.css" />

  <!-- html5-qrcode for QR camera scanning -->
  <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
</head>
<body>

  <!-- ── PAIRING SCREEN ───────────────────────────────────────────────── -->
  <div id="pairing-screen" class="screen">
    <div class="card pairing-card">
      <div class="logo">
        <span class="logo-icon">📋</span>
        <h1>ClipSync</h1>
      </div>
      <p class="subtitle">Pair your Android phone to start syncing your clipboard.</p>

      <div id="qr-reader"></div>

      <button id="btn-start-scan" class="btn btn-primary">
        📷 Scan QR Code
      </button>

      <p id="pairing-status" class="pairing-status" aria-live="polite"></p>

      <div class="pairing-help">
        <p>Open the <strong>ClipSync</strong> app on your Android phone,<br />
           then tap <strong>Show QR Code</strong> to display the pairing code.</p>
      </div>
    </div>
  </div>

  <!-- ── MAIN SCREEN ──────────────────────────────────────────────────── -->
  <div id="main-screen" class="screen hidden">

    <!-- Header -->
    <header class="app-header">
      <div class="header-brand">
        <span class="logo-icon">📋</span>
        <span class="app-name">ClipSync</span>
      </div>
      <div class="header-status">
        <span id="status-dot" class="status-dot offline" aria-hidden="true"></span>
        <span id="status-label" class="status-label">Offline</span>
      </div>
      <button id="btn-unpair" class="btn btn-ghost btn-sm" title="Unpair device">
        Unpair
      </button>
    </header>

    <main class="main-content">

      <!-- From Phone Panel -->
      <section class="panel" aria-labelledby="from-phone-title">
        <h2 id="from-phone-title" class="panel-title">
          📱 Last synced from Phone
        </h2>
        <div class="clipboard-display" aria-live="polite">
          <p id="last-text" class="clip-text placeholder">Nothing received yet…</p>
          <p id="last-ts"   class="clip-ts"></p>
        </div>
        <button id="btn-copy-laptop" class="btn btn-primary" disabled>
          Copy to Clipboard
        </button>
      </section>

      <!-- Send to Phone Panel -->
      <section class="panel" aria-labelledby="send-phone-title">
        <h2 id="send-phone-title" class="panel-title">
          💻 Send text to Phone
        </h2>
        <textarea
          id="send-textarea"
          class="send-textarea"
          placeholder="Paste or type text to send to your phone…"
          rows="4"
          aria-label="Text to send to phone"
        ></textarea>
        <button id="btn-send" class="btn btn-primary">
          Send to Phone
        </button>
      </section>

    </main>
  </div>

  <!-- App entry point (ES module) -->
  <script type="module" src="app.js"></script>
</body>
</html>
