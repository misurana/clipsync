<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ClipSync</title>
  <link rel="stylesheet" href="style.css" />
  <!-- qrcode.js — renders QR into a div as <img> or <canvas> -->
  <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
</head>
<body>

  <!-- ── PAIRING SCREEN ───────────────────────────────────────────────── -->
  <div id="pairing-screen" class="screen">
    <div class="card pairing-card">
      <div class="logo">
        <span class="logo-icon">📋</span>
        <h1>ClipSync</h1>
      </div>
      <p class="subtitle">Scan this QR code with your Android phone to pair.</p>

      <!-- qrcode.js renders an <img> tag inside this div -->
      <div class="qr-wrapper">
        <div id="qr-container"></div>
      </div>

      <p id="pairing-status" class="pairing-status" aria-live="polite">
        Generating QR code…
      </p>

      <div class="pairing-help">
        <p>1. Open the <strong>ClipSync</strong> app on your Android phone.<br />
           2. Tap <strong>Scan QR Code</strong>.<br />
           3. Point your camera at the code above.</p>
      </div>

      <button id="btn-new-qr" class="btn btn-ghost btn-sm">
        🔄 Generate new QR
      </button>
    </div>
  </div>

  <!-- ── MAIN SCREEN ──────────────────────────────────────────────────── -->
  <div id="main-screen" class="screen hidden">

    <header class="app-header">
      <div class="header-brand">
        <span class="logo-icon">📋</span>
        <span class="app-name">ClipSync</span>
      </div>
      <div class="header-status">
        <span id="status-dot" class="status-dot offline" aria-hidden="true"></span>
        <span id="status-label" class="status-label">Offline</span>
      </div>
      <button id="btn-unpair" class="btn btn-ghost btn-sm">Unpair</button>
    </header>

    <main class="main-content">

      <section class="panel" aria-labelledby="from-phone-title">
        <h2 id="from-phone-title" class="panel-title">📱 Last synced from Phone</h2>
        <div class="clipboard-display" aria-live="polite">
          <p id="last-text" class="clip-text placeholder">Nothing received yet…</p>
          <p id="last-ts" class="clip-ts"></p>
        </div>
        <button id="btn-copy-laptop" class="btn btn-primary" disabled>
          Copy to Clipboard
        </button>
      </section>

      <section class="panel" aria-labelledby="send-phone-title">
        <h2 id="send-phone-title" class="panel-title">💻 Send text to Phone</h2>
        <textarea
          id="send-textarea"
          class="send-textarea"
          placeholder="Paste or type text to send to your phone…"
          rows="4"
          aria-label="Text to send to phone"
        ></textarea>
        <button id="btn-send" class="btn btn-primary">Send to Phone</button>
      </section>

    </main>
  </div>

  <script type="module" src="app.js"></script>
</body>
</html>
